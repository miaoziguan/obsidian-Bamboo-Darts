name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 需要完整历史以计算增量覆盖率

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Check incremental coverage
        run: npm run test:coverage:check -- --base origin/main --threshold 60
